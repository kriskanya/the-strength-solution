# Deploys to Google Cloud Run on every push to main.
#
# Repository setup:
# - Secret: GCP_SA_KEY — JSON key for a service account with permission to deploy
#   to Cloud Run and run Cloud Build (e.g. roles/run.admin, roles/cloudbuild.builds.editor,
#   roles/iam.serviceAccountUser on the runtime SA, and access to the referenced secrets).
# - Variable (optional): GCP_PROJECT — Google Cloud project ID if it should not be taken
#   from the service account’s default project.

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
        run: |
          set -euo pipefail
          DEPLOY_CMD=(gcloud run deploy the-strength-solution-web
            --source .
            --region us-central1
            --service-account cloud-run-web@the-strength-solution.iam.gserviceaccount.com
            --allow-unauthenticated
            --set-secrets "POSTGRES_URL=POSTGRES_URL:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,FACEBOOK_CLIENT_ID=FACEBOOK_CLIENT_ID:latest,FACEBOOK_CLIENT_SECRET=FACEBOOK_CLIENT_SECRET:latest")
          if [ -n "${GCP_PROJECT}" ]; then
            DEPLOY_CMD+=(--project "${GCP_PROJECT}")
          fi
          "${DEPLOY_CMD[@]}"
